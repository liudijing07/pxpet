<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title></title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: transparent !important; user-select: none;
    }
    #pet-container {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      cursor: grab;
    }
    #pet-container.dragging { cursor: grabbing; }
    #pet-sprite { image-rendering: pixelated; }
  </style>
</head>
<body>
  <div id="pet-container">
    <img id="pet-sprite" draggable="false">
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const path = require('path');
    const fs = require('fs');

    let metadata = null;
    let currentAnim = 'idle';
    let currentFrame = 0;
    let animTimer = null;
    let frameImages = {};

    const container = document.getElementById('pet-container');
    const sprite = document.getElementById('pet-sprite');

    // ===== Sound System =====
    let sounds = { short: [], medium: [], long: [] };
    let soundEnabled = true;
    let lastSoundTime = 0;
    const SOUND_COOLDOWN = 3000; // Min 3s between sounds

    function loadSounds(charName) {
      sounds = { short: [], medium: [], long: [] };
      const soundDir = path.join(__dirname, 'sounds', charName);
      if (!fs.existsSync(soundDir)) return;
      
      const files = fs.readdirSync(soundDir).filter(f => f.endsWith('.wav')).sort();
      for (const file of files) {
        const filePath = path.join(soundDir, file);
        const audio = new Audio(filePath);
        
        // Categorize by file size (rough duration estimate)
        const stat = fs.statSync(filePath);
        const sizeKB = stat.size / 1024;
        
        if (sizeKB < 80) {
          sounds.short.push(audio); // < 1s: click/reaction
        } else if (sizeKB < 250) {
          sounds.medium.push(audio); // 1-3s: idle/walk
        } else {
          sounds.long.push(audio); // > 3s: special
        }
      }
      console.log(`[Sound] Loaded: ${sounds.short.length} short, ${sounds.medium.length} medium, ${sounds.long.length} long`);
    }

    function playRandomSound(category) {
      if (!soundEnabled) return;
      const now = Date.now();
      if (now - lastSoundTime < SOUND_COOLDOWN) return;
      
      const pool = sounds[category];
      if (!pool || pool.length === 0) return;
      
      const audio = pool[Math.floor(Math.random() * pool.length)];
      audio.currentTime = 0;
      audio.volume = 0.6;
      audio.play().catch(() => {}); // Ignore autoplay errors
      lastSoundTime = now;
    }

    function loadCharacter(charName) {
      const framesDir = ipcRenderer.sendSync('get-frames-dir');
      metadata = ipcRenderer.sendSync('get-metadata');
      if (!metadata) return;
      frameImages = {};
      for (const [animName, animData] of Object.entries(metadata.animations)) {
        frameImages[animName] = [];
        for (const frame of animData.frames) {
          frameImages[animName].push(path.join(framesDir, frame.file));
        }
      }
      loadSounds(charName);
      goIdle();
    }

    // ===== Animation Engine =====
    // resizeOk: whether renderFrame should send resize-window
    let resizeOk = true;

    function playAnim(animName, opts = {}) {
      const { loop, duration, onDone } = opts;
      if (animName.includes('shadow')) return;
      if (!metadata || !metadata.animations[animName]) animName = 'idle';
      if (animTimer) { clearInterval(animTimer); animTimer = null; }

      currentAnim = animName;
      currentFrame = 0;
      const anim = metadata.animations[animName];
      const fps = anim.fps || 6;
      const shouldLoop = loop !== undefined ? loop : anim.loop;

      // For non-idle animations, lock window to max frame size to prevent jitter
      if (animName !== 'idle') {
        let maxW = 0, maxH = 0;
        for (const f of anim.frames) {
          if (f.size[0] > maxW) maxW = f.size[0];
          if (f.size[1] > maxH) maxH = f.size[1];
        }
        resizeOk = false;
        ipcRenderer.send('resize-window', { width: maxW, height: maxH });
        // Brief delay to let resize happen before locking
        setTimeout(() => { resizeOk = false; }, 50);
      } else {
        resizeOk = true;
      }

      renderFrame();
      animTimer = setInterval(() => {
        currentFrame++;
        if (currentFrame >= anim.frame_count) {
          if (shouldLoop) {
            currentFrame = 0;
          } else {
            clearInterval(animTimer); animTimer = null;
            if (onDone) onDone();
            else goIdle();
            return;
          }
        }
        renderFrame();
      }, 1000 / fps);

      // If duration specified, stop after that time
      if (duration) {
        setTimeout(() => {
          if (currentAnim === animName) {
            if (animTimer) { clearInterval(animTimer); animTimer = null; }
            if (onDone) onDone();
            else goIdle();
          }
        }, duration);
      }
    }

    function renderFrame() {
      const frames = frameImages[currentAnim];
      if (!frames || currentFrame >= frames.length) return;
      sprite.src = frames[currentFrame];
      if (resizeOk) {
        const fd = metadata.animations[currentAnim].frames[currentFrame];
        ipcRenderer.send('resize-window', { width: fd.size[0], height: fd.size[1] });
      }
    }

    // ===== States =====
    let isMouseDown = false;
    let isWalking = false;
    let isActionLocked = false; // Menu-triggered actions lock for duration

    function goIdle() {
      stopWalk();
      resizeOk = true;
      isActionLocked = false;
      playAnim('idle');
    }

    // ===== Drag (拖拽移动，不播放特殊动画) =====
    let dragOffset = { x: 0, y: 0 };

    container.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      isMouseDown = true;
      dragOffset.x = e.clientX;
      dragOffset.y = e.clientY;
      container.classList.add('dragging');
      if (isWalking) stopWalk();
      // Play drag (拎起) animation
      if (metadata && metadata.animations['drag']) playAnim('drag');
      ipcRenderer.send('drag-start');
      playRandomSound('short');
    });

    document.addEventListener('mousemove', (e) => {
      if (!isMouseDown) return;
      ipcRenderer.send('drag-move', {
        screenX: e.screenX, screenY: e.screenY,
        offsetX: dragOffset.x, offsetY: dragOffset.y,
      });
    });

    document.addEventListener('mouseup', () => {
      if (!isMouseDown) return;
      isMouseDown = false;
      container.classList.remove('dragging');
      ipcRenderer.send('drag-end');
      // Return to idle
      resizeOk = true;
      playAnim('idle');
    });

    // Double-click → chat
    container.addEventListener('dblclick', (e) => {
      e.preventDefault();
      ipcRenderer.send('toggle-chat');
    });

    // Right-click → context menu
    container.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      ipcRenderer.send('show-context-menu');
    });

    // ===== Walking (wrap-around edges) =====
    let walkTimer = null;
    let walkStopTimeout = null;
    const WALK_SPEED = 1.5;
    let walkDx = 0, walkDy = 0;

    function startWalk(dx, dy, duration) {
      stopWalk();
      isWalking = true;
      walkDx = dx; walkDy = dy;

      // Pick walk anim based on horizontal direction
      const animName = dx <= 0 ? 'walk_left' : 'walk_right';
      if (!metadata || !metadata.animations[animName]) { isWalking = false; return; }

      // Disable resize during walk
      resizeOk = false;

      // Do NOT resize before walking — keep current window size to prevent position jump

      // Play walk animation (looping)
      currentAnim = animName;
      currentFrame = 0;
      const anim = metadata.animations[animName];
      const fps = anim.fps || 8;
      if (animTimer) { clearInterval(animTimer); animTimer = null; }
      renderFrame();
      animTimer = setInterval(() => {
        currentFrame = (currentFrame + 1) % anim.frame_count;
        renderFrame();
      }, 1000 / fps);

      // Movement timer
      ipcRenderer.send('walk-start');
      walkTimer = setInterval(() => {
        ipcRenderer.send('walk-step', { dx: walkDx * WALK_SPEED, dy: walkDy * WALK_SPEED });
      }, 1000 / 30);

      // Auto-stop
      const stopTime = duration || (3000 + Math.random() * 5000);
      walkStopTimeout = setTimeout(() => {
        if (isWalking) goIdle();
      }, stopTime);
    }

    function stopWalk() {
      if (walkTimer) { clearInterval(walkTimer); walkTimer = null; }
      if (walkStopTimeout) { clearTimeout(walkStopTimeout); walkStopTimeout = null; }
      if (isWalking) ipcRenderer.send('walk-stop');
      isWalking = false;
      resizeOk = true;
    }

    function startRandomWalk(duration) {
      const angle = Math.random() * Math.PI * 2;
      startWalk(Math.cos(angle), Math.sin(angle), duration);
    }

    // Wrap-around: left↔right, top↔bottom
    ipcRenderer.on('wrap-around', (event, side) => {
      if (!isWalking) return;
      // Position is already updated by main process, just keep going
    });

    // Direction flip when walk anim needs to change
    ipcRenderer.on('flip-walk-anim', (event, newDx) => {
      if (!isWalking) return;
      const newAnim = newDx <= 0 ? 'walk_left' : 'walk_right';
      if (currentAnim !== newAnim && metadata && metadata.animations[newAnim]) {
        currentAnim = newAnim;
        currentFrame = 0;
      }
    });

    // ===== Context menu actions =====
    ipcRenderer.on('do-action', (event, action) => {
      if (action === 'idle') {
        goIdle();
      } else if (action === 'walk') {
        startRandomWalk(20000); // Walk for 20s from menu
        playRandomSound('medium');
      } else if (action.startsWith('special') || action === 'drag') {
        if (isWalking) stopWalk();
        isActionLocked = true;
        playRandomSound('long');
        // Loop the action for 20 seconds
        playAnim(action, { loop: true, duration: 20000, onDone: goIdle });
      }
    });

    // ===== Random Behaviors =====
    let idleTime = 0;
    setInterval(() => {
      if (isMouseDown || isWalking || isActionLocked) { idleTime = 0; return; }
      if (currentAnim !== 'idle') return;
      idleTime++;
      
      // Occasionally make idle sounds (every ~20-40s)
      if (idleTime > 4 && Math.random() < 0.1) {
        playRandomSound('medium');
      }
      
      const rand = Math.random();
      const chance = Math.min(0.3, 0.05 + idleTime * 0.02);

      if (rand < chance * 0.6) {
        startRandomWalk();
        playRandomSound('medium');
        idleTime = 0;
      } else if (rand < chance) {
        const specials = Object.keys(metadata.animations)
          .filter(n => n.startsWith('special') && !n.includes('shadow'));
        if (specials.length > 0) {
          playAnim(specials[Math.floor(Math.random() * specials.length)]);
          playRandomSound('long');
          idleTime = 0;
        }
      }
    }, 5000);

    ipcRenderer.on('switch-character', (event, charName) => loadCharacter(charName));
    ipcRenderer.on('play-animation', (event, animName) => playAnim(animName));
    ipcRenderer.on('toggle-sound', () => {
      soundEnabled = !soundEnabled;
      if (soundEnabled) playRandomSound('short'); // Confirmation beep
    });

    loadCharacter(ipcRenderer.sendSync('get-character'));
  </script>
</body>
</html>
